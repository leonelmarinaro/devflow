services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automation_net

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Base de datos
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # Autenticación
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      # General
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: ${TIMEZONE}
      TZ: ${TIMEZONE}
      # FastAPI interna
      FASTAPI_URL: http://fastapi:8000
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - automation_net

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      FASTAPI_SECRET_KEY: ${FASTAPI_SECRET_KEY}
      FASTAPI_ALLOWED_ORIGINS: ${FASTAPI_ALLOWED_ORIGINS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      INVOICE_TEMPLATE_PATH: /facturas/EXT - MAKE A COPY - Modelo Factura Contractor GKT.docx
      INVOICE_OUTPUT_DIR: /facturas
      TIMEZONE: ${TIMEZONE}
    volumes:
      - ./fastapi/app:/app/app
      - ${INVOICE_HOST_DIR:-/Users/lmarinaro/Documents/Leo/Facturas}:/facturas
    networks:
      - automation_net

volumes:
  postgres_data:
  n8n_data:

networks:
  automation_net:
    driver: bridge
